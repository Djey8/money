<!-- Mobile bottom nav: compact 5-item bar -->
<nav class="bottom-nav bottom-nav--mobile" *ngIf="!isAuthPage && !statsMode" role="navigation" aria-label="Main navigation">
  <button class="bottom-nav-item" [class.active]="isActive('/home')"
    (click)="goHome()" aria-label="Home">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span class="nav-label">{{'Menu.home' | translate}}</span>
  </button>

  <button class="bottom-nav-item" [class.active]="isActive('/transactions')"
    (click)="goTransactions()" aria-label="Transactions">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="21" y2="6"/>
      <line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/>
      <line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    <span class="nav-label">{{'Menu.transactions' | translate}}</span>
  </button>

  <button class="bottom-nav-item bottom-nav-add" (click)="smartAdd()" aria-label="Add">
    <div class="add-btn">
      <svg class="nav-icon-add" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
  </button>

  <button class="bottom-nav-item" [class.active]="isActive('/stats')"
    (click)="smartStats()" aria-label="Statistics">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/>
      <line x1="12" y1="20" x2="12" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    <span class="nav-label">{{'Menu.stats' | translate}}</span>
  </button>

  <button class="bottom-nav-item" (click)="openMenu()" aria-label="Menu">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    <span class="nav-label">{{'Menu.title' | translate}}</span>
  </button>
</nav>

      <line x1="3" y1="18" x2="21" y2="18"/>
