<div id="addFire-Container" role="dialog" aria-modal="true" appTrapFocus *ngIf="classReference.isAdd" (click)="highlight()"
    [style.z-index]="classReference.zIndex + 1001">
    <h4 id="addFireTitle">{{'AddLiabilitie.title' | translate}}</h4>
    <button id="closebtn" aria-label="Close" (click)="closeWindow()">x</button>
    <hr class="separator-white">
    <form id="input-container">
        <label for="title" class="required" [class.form-error-text]="classReference.isError">{{'AddAsset.name' | translate}}</label>
        <input type="text" id="title" name="title" aria-required="true" [class.form-error-border]="classReference.isError" [(ngModel)]="titleTextField"
            [attr.aria-invalid]="classReference.isError ? true : null" [attr.aria-describedby]="classReference.isError ? 'title-error' : null">
        <span class="field-error" id="title-error" role="alert" *ngIf="classReference.isError && !titleTextField">{{'AddAsset.name' | translate}}</span>
        <label for="amount" class="required" [class.form-error-text]="classReference.isError">{{'AddAsset.amount' | translate}}</label>
        <input type=number step=any id="amount" name="amount" aria-required="true" [class.form-error-border]="classReference.isError"
            [(ngModel)]="amountTextField" class="mb-xs"
            [attr.aria-invalid]="classReference.isError ? true : null" [attr.aria-describedby]="classReference.isError ? 'amount-error' : null">
        <span class="field-error" id="amount-error" role="alert" *ngIf="classReference.isError && !amountTextField">{{'AddAsset.amount' | translate}}</span>
        <label for="credit">{{'Balance.Credit' | translate}}</label>
        <input type=number step=any id="credit" name="credit"
            [(ngModel)]="creditTextField" class="mb-xs">
        <div class="toggle-row" role="switch" tabindex="0" [attr.aria-checked]="isInvestment" (click)="isInvestment = !isInvestment" (keydown.enter)="isInvestment = !isInvestment" (keydown.space)="isInvestment = !isInvestment; $event.preventDefault()">
            <span class="toggle-label">{{'Choose.Investment' | translate}}</span>
            <div class="toggle-switch" [ngClass]="{'toggle-on': isInvestment}">
                <div class="toggle-knob"></div>
            </div>
        </div>
        <div class="toggle-row" role="switch" tabindex="0" [attr.aria-checked]="AddToFire" (click)="AddToFire = !AddToFire" (keydown.enter)="AddToFire = !AddToFire" (keydown.space)="AddToFire = !AddToFire; $event.preventDefault()">
            <span class="toggle-label">{{'AddLiabilitie.addToFire' | translate}}</span>
            <div class="toggle-switch" [ngClass]="{'toggle-on': AddToFire}">
                <div class="toggle-knob"></div>
            </div>
        </div>
    </form>
    <p id="errorLable" *ngIf="classReference.isError">{{errorTextLable}}</p>
    <button id="addbtn" class="btn btn--action" (click)="addLiabilitie()">{{'AddAsset.add' | translate}}</button>
</div>
