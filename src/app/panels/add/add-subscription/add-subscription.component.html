<div id="addTransaction-Container" role="dialog" aria-modal="true" appTrapFocus *ngIf="classReference.isAdd" (click)="highlight()"
    [style.z-index]="classReference.zIndex + 1001">
    <h4 id="addTransactionTitle">{{'AddSubscription.title' | translate}}</h4>
    <button id="closebtn" aria-label="Close" (click)="closeWindow()">x</button>
    <hr class="separator-white">
    <form id="input-container">
        <label for="name" class="required" [class.form-error-text]="classReference.isError">{{'Subscription.name' | translate}}</label>
        <input type=text step=any id="name" name="name" aria-required="true" [class.form-error-border]="classReference.isError"
            [(ngModel)]="classReference.titleTextField"
            [attr.aria-invalid]="classReference.isError ? true : null">
        <label for="account" class="required" [class.form-error-text]="classReference.isError && fieldErrors['account']">{{'AddTransaction.Account' | translate}}</label>
        <select [(ngModel)]="classReference.selectedOption" id="account" name="account" aria-required="true"
            [class.form-error-border]="classReference.isError && fieldErrors['account']"
            [attr.aria-describedby]="fieldErrors['account'] ? 'account-error' : null" [attr.aria-invalid]="fieldErrors['account'] ? true : null">
            <option value="Daily">{{'Menu.daily' | translate}}</option>
            <option value="Splurge">{{'Menu.splurge' | translate}}</option>
            <option value="Smile">{{'Menu.smile' | translate}}</option>
            <option value="Fire">{{'Menu.fire' | translate}}</option>
            <option value="Income">{{'AddTransaction.Income' | translate}}</option>
            <option value="Mojo">{{'Income.Mojo' | translate}}</option>
        </select>
        <span class="field-error" id="account-error" role="alert" *ngIf="fieldErrors['account']">{{fieldErrors['account']}}</span>
        <label for="amount" class="required" [class.form-error-text]="classReference.isError && fieldErrors['amount']">{{'Common.amount' | translate}}</label>
        <input type=number step=any id="amount" name="amount" aria-required="true" [class.form-error-border]="classReference.isError && fieldErrors['amount']"
            [(ngModel)]="classReference.amountTextField"
            [attr.aria-describedby]="fieldErrors['amount'] ? 'amount-error' : null" [attr.aria-invalid]="fieldErrors['amount'] ? true : null">
        <span class="field-error" id="amount-error" role="alert" *ngIf="fieldErrors['amount']">{{fieldErrors['amount']}}</span>
        <label for="frequency" class="required">
            {{'Subscription.frequency.label' | translate}}
            <span class="help-icon" [title]="'Subscription.frequency.help' | translate">ⓘ</span>
        </label>
        <select id="frequency" name="frequency" [(ngModel)]="classReference.frequencyField" aria-required="true">
            <option value="weekly" [title]="'Subscription.frequency.weekly.help' | translate">{{'Subscription.frequency.weekly' | translate}}</option>
            <option value="biweekly" [title]="'Subscription.frequency.biweekly.help' | translate">{{'Subscription.frequency.biweekly' | translate}}</option>
            <option value="monthly" selected [title]="'Subscription.frequency.monthly.help' | translate">{{'Subscription.frequency.monthly' | translate}}</option>
            <option value="quarterly" [title]="'Subscription.frequency.quarterly.help' | translate">{{'Subscription.frequency.quarterly' | translate}}</option>
            <option value="yearly" [title]="'Subscription.frequency.yearly.help' | translate">{{'Subscription.frequency.yearly' | translate}}</option>
        </select>
        <label for="date">{{'Subscription.startDate' | translate}}</label>
        <input type=date step=any id="date" name="date" [(ngModel)]="startDateTextField">
        <label for="time">{{'Subscription.endDate' | translate}}</label>
        <input type=date step=any id="date" name="date" [(ngModel)]="endDateTextField">
        <label for="category" class="required" [class.form-error-text]="classReference.isError && fieldErrors['category']">{{'AddTransaction.Category' | translate}}</label>
        <div class="flex-row-center">
            <input type="text" id="category" name="category" aria-required="true" [class.form-error-border]="classReference.isError && fieldErrors['category']"
            [(ngModel)]="classReference.categoryTextField" *ngIf="!showCategoryOptions" class="flex-1"
            [attr.aria-describedby]="fieldErrors['category'] ? 'category-error' : null" [attr.aria-invalid]="fieldErrors['category'] ? true : null">
            <select *ngIf="showCategoryOptions" id="categoryOptions" name="categoryOptions" 
            [(ngModel)]="classReference.categoryTextField" (change)="showCategoryOptions = false" [class.form-error-border]="classReference.isError && fieldErrors['category']" class="mr-xs"
            [attr.aria-describedby]="fieldErrors['category'] ? 'category-error' : null" [attr.aria-invalid]="fieldErrors['category'] ? true : null">
            <option *ngFor="let option of categoryOptions" [value]="option.value">{{option.label | translate}}</option>
            </select>
            <button type="button" (click)="toggleCategoryOptions()" class="category-toggle-btn" aria-label="Toggle input mode">
            <span class="swap-icon">⇄</span>
            </button>
        </div>
        <span class="field-error" id="category-error" role="alert" *ngIf="fieldErrors['category']">{{fieldErrors['category']}}</span>
        <label for="comment">{{'AddTransaction.Comment' | translate}}</label>
        <textarea id="comment" name="comment" rows="4" cols="50"
            [(ngModel)]="classReference.commentTextField"></textarea>
    </form>
    <p id="errorLable" *ngIf="classReference.isError">{{errorTextLable}}</p>
    <button id="addbtn" class="btn btn--action" (click)="addSubscription()">{{'AddAsset.add' | translate}}</button>
</div>
