events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;

    # Gzip compression — reduces JSON API responses by 80-90%
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # Allow larger request bodies for encrypted batch writes
    client_max_body_size 5m;
    
    # HTTP Server - Port 8080
    server {
        listen       8080;
        server_name  localhost money.local cashflowhero.uk www.cashflowhero.uk;

        # Redirect to HTTPS in production (Traefik handles this at ingress level,
        # but this catches direct NodePort access)
        if ($http_x_forwarded_proto = "http") {
            return 301 https://$host$request_uri;
        }

        # Proxy API requests to backend
        location /api {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            # CORS handled by backend Express cors middleware (CORS_ORIGINS env var)
        }

        # CouchDB admin access REMOVED for security
        # Use: kubectl port-forward svc/couchdb 5984:5984 -n money-app

        # Security headers for frontend
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' https://cashflowhero.uk https://*.cashflowhero.uk https://*.firebaseio.com https://*.googleapis.com https://apis.google.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Prevent browser caching of translation files
        location /assets/i18n/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location / {
            root   /usr/share/nginx/html;
            try_files   $uri $uri/ /index.html =404;
            index  index.html index.htm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }

    # HTTPS Server - Port 8443
    server {
        listen       8443 ssl;
        server_name  localhost money.local cashflowhero.uk www.cashflowhero.uk;

        # SSL Certificate paths (mounted from Kubernetes secret)
        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Proxy API requests to backend
        location /api {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            # CORS handled by backend Express cors middleware (CORS_ORIGINS env var)
        }

        # CouchDB admin access REMOVED for security
        # Use: kubectl port-forward svc/couchdb 5984:5984 -n money-app

        # Security headers for frontend
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' https://cashflowhero.uk https://*.cashflowhero.uk https://*.firebaseio.com https://*.googleapis.com https://apis.google.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://*.firebaseio.com https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        # Prevent browser caching of translation files
        location /assets/i18n/ {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, must-revalidate";
            expires 0;
        }

        location / {
            root   /usr/share/nginx/html;
            try_files   $uri $uri/ /index.html =404;
            index  index.html index.htm;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}