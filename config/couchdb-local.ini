; CouchDB performance tuning for Raspberry Pi / self-hosted
; Mount this file to /opt/couchdb/etc/local.d/ in the container

[couchdb]
; Reduce max document body size to 8MB (default is unlimited)
max_document_size = 8388608

[chttpd]
; Bind to all interfaces (required for container networking)
bind_address = 0.0.0.0
; Limit connections for constrained hardware
max_connections = 50

[chttpd]
bind_address = 0.0.0.0
; Reduce max connections for Pi resource constraints
max_connections = 50

[query_server_config]
; Reduce JavaScript query server memory for Pi
reduce_limit = true
