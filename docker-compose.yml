version: '3.8'

# Base stack: only the 3 essential services (CouchDB, Backend, Frontend)
# For logging/monitoring, add the overlay:
#   docker-compose -f docker-compose.yml -f docker-compose.logging.yml up -d
#   (or: podman-compose -f docker-compose.yml -f docker-compose.logging.yml up -d)

services:
  couchdb:
    image: couchdb:3.3
    container_name: money-couchdb
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=changeme
    volumes:
      - couchdb-data:/opt/couchdb/data
      - ./config/couchdb-local.ini:/opt/couchdb/etc/local.d/local.ini
    networks:
      - money-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: money-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=changeme
      - JWT_SECRET=your-super-secret-jwt-key-change-this
      - CORS_ORIGINS=http://localhost:4200,http://localhost,http://frontend:8080,https://cashflowhero.uk,https://www.cashflowhero.uk
      - SKIP_RATE_LIMIT=true
    depends_on:
      - couchdb
    networks:
      - money-network
    restart: unless-stopped

  frontend:
    build: .
    container_name: money-frontend
    ports:
      - "80:8080"
    depends_on:
      - backend
    networks:
      - money-network
    restart: unless-stopped

volumes:
  couchdb-data:

networks:
  money-network:
    driver: bridge
