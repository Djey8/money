version: '3.8'

# Logging overlay — adds Loki, Promtail, and Grafana to the base stack.
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.logging.yml up -d
#   (or: podman-compose -f docker-compose.yml -f docker-compose.logging.yml up -d)
#
# To disable logging and free ~800MB RAM:
#   docker-compose -f docker-compose.yml -f docker-compose.logging.yml down
#   docker-compose up -d

services:
  backend:
    environment:
      - LOG_LEVEL=info

  loki:
    image: grafana/loki:2.9.3
    container_name: money-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    networks:
      - money-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.3
    container_name: money-promtail
    volumes:
      - ./config/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yaml
    depends_on:
      - loki
    networks:
      - money-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: money-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
    networks:
      - money-network
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
