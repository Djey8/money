# E2E test stack — CouchDB + backend, frontend served by ng serve separately.
# Usage: podman compose -f docker-compose.e2e.yml up -d
#        npx playwright test
#        podman compose -f docker-compose.e2e.yml down -v
version: '3.8'

services:
  couchdb-e2e:
    image: couchdb:3.3
    container_name: money-couchdb-e2e
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    tmpfs:
      - /opt/couchdb/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend-e2e:
    build: ./backend
    container_name: money-backend-e2e
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=test
      - COUCHDB_URL=http://couchdb-e2e:5984
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
      - JWT_SECRET=e2e-test-secret-key
      - CORS_ORIGINS=http://localhost:4200
      - SKIP_RATE_LIMIT=true
    depends_on:
      couchdb-e2e:
        condition: service_healthy
