# Lightweight test stack — CouchDB only, ephemeral, for backend integration tests.
# Usage: podman compose -f docker-compose.test.yml up -d
#        podman compose -f docker-compose.test.yml down -v
version: '3.8'

services:
  couchdb-test:
    image: couchdb:3.3
    container_name: money-couchdb-test
    ports:
      - "5986:5984"
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    tmpfs:
      - /opt/couchdb/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
