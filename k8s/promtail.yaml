# Promtail - Log collector for Loki
# Collects logs from all pods and sends them to Loki
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: money-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: money-app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: money-app
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Static configuration for all money-app logs
      # Using static config because Kubernetes SD has compatibility issues with K3s
      - job_name: money-app-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: money-app
              __path__: /var/log/pods/money-app*/**/*.log
        pipeline_stages:
          # Extract log content from Kubernetes log format (timestamp stream flag JSON)
          - regex:
              expression: '^[^ ]+ [^ ]+ [^ ] (?P<log>.*)$'
          # Extract pod and container info from file path
          - regex:
              expression: '/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*'
              source: filename
          # Add basic labels (namespace, pod, container)
          - labels:
              namespace:
              pod:
              container:
          
          # Parse JSON logs ONLY from backend containers
          - match:
              selector: '{container="backend"}'
              stages:
                - json:
                    expressions:
                      timestamp: timestamp
                      level: level
                      message: message
                      # Extract from root level (Winston outputs flat JSON now)
                      service: service
                      environment: environment
                      requestType: requestType
                      activityType: activityType
                      securityType: securityType
                      errorType: errorType
                      warningType: warningType
                      path: path
                      method: method
                      statusCode: statusCode
                      responseTime: responseTime
                      responseTimeMs: responseTimeMs
                      userId: userId
                      action: action
                      operation: operation
                      requestId: requestId
                      source: source
                    source: log
                - labels:
                    level:
                    service:
                    requestType:
                    method:
                    statusCode:
                    userId:
                    path:
                    source:
                    action:
                - timestamp:
                    source: timestamp
                    format: "2006-01-02 15:04:05"
          
          # Parse nginx access logs from frontend containers
          - match:
              selector: '{container="frontend"}'
              stages:
                - regex:
                    expression: '^(?P<client_ip>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<timestamp>[^\]]+)\] "(?P<method>[A-Z]+) (?P<path>[^ ]+) HTTP/[^"]+" (?P<status_code>\d+) (?P<bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
                    source: log
                - labels:
                    method:
                    status_code:
                - static_labels:
                    service: frontend-nginx
                    requestType: http_request
                    context_source: frontend
                - timestamp:
                    source: timestamp
                    format: "02/Jan/2006:15:04:05 -0700"
          
          # Parse CouchDB Erlang logs
          - match:
              selector: '{container="couchdb"}'
              stages:
                - regex:
                    expression: '^\[(?P<level>[^\]]+)\] (?P<timestamp>[^ ]+) [^ ]+ [^ ]+ -------- (?P<message>.*)'
                    source: log
                - labels:
                    level:
                - static_labels:
                    service: couchdb
                    context_source: database
                - timestamp:
                    source: timestamp
                    format: "2006-01-02T15:04:05.999999Z"

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: money-app
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:2.9.3
        imagePullPolicy: IfNotPresent
        args:
          - -config.file=/etc/promtail/promtail.yaml
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
