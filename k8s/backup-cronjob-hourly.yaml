apiVersion: batch/v1
kind: CronJob
metadata:
  name: couchdb-backup-hourly
  namespace: money-app
spec:
  schedule: "0 * * * *"
  # Skip a run rather than queuing if it cannot start within 5 minutes
  startingDeadlineSeconds: 300
  # Never run two hourly backups concurrently
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  # Keep failed jobs around long enough to inspect logs after the fact
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      # Kill the job if it runs longer than 30 minutes
      activeDeadlineSeconds: 1800
      # Retry a few times — a transient node hiccup shouldn't fail the hour
      backoffLimit: 3
      template:
        metadata:
          labels:
            job-type: couchdb-backup
        spec:
          containers:
          - name: backup
            image: alpine:3.21
            securityContext:
              allowPrivilegeEscalation: false
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              #!/bin/sh
              set -e

              # Install required tools (retry — Alpine mirrors flap occasionally)
              for i in 1 2 3 4 5; do
                if apk add --no-cache curl gnupg > /dev/null 2>&1; then
                  break
                fi
                echo "apk add attempt $i failed, retrying in 10s..."
                sleep 10
              done
              command -v curl >/dev/null || { echo "curl install failed"; exit 1; }
              command -v gpg  >/dev/null || { echo "gpg install failed";  exit 1; }

              # ── Configuration ──────────────────────────────────
              COUCHDB_HOST="couchdb.money-app.svc.cluster.local"
              COUCHDB_PORT="5984"
              COUCHDB_USER="${COUCHDB_USER:-admin}"
              COUCHDB_PASSWORD="${COUCHDB_PASSWORD}"
              BACKUP_ROOT="/backups"
              DATE=$(date +%Y-%m-%d)
              HOUR=$(date +%H)

              HOURLY_DIR="${BACKUP_ROOT}/hourly"
              HOURLY_FILE="${HOURLY_DIR}/couchdb-backup-${DATE}_${HOUR}00.tar.gz"

              echo "==================================="
              echo "CouchDB Hourly Backup - $(date)"
              echo "==================================="

              mkdir -p "${HOURLY_DIR}" "${BACKUP_ROOT}/temp"

              # ── Fetch database list ────────────────────────────
              echo "Fetching database list..."
              RAW=$(curl -sf -u "${COUCHDB_USER}:${COUCHDB_PASSWORD}" \
                "http://${COUCHDB_HOST}:${COUCHDB_PORT}/_all_dbs")

              DATABASES=$(echo "$RAW" | tr -d '[]"' | tr ',' '\n' | grep -v '^_')

              if [ -z "$DATABASES" ]; then
                echo "ERROR: No user databases found — aborting."
                exit 1
              fi

              echo "Databases to backup:"
              echo "$DATABASES" | sed 's/^/  /'

              # ── Backup each database ───────────────────────────
              cd "${BACKUP_ROOT}/temp"
              for db in $DATABASES; do
                echo "Backing up: ${db}"
                curl -sf -u "${COUCHDB_USER}:${COUCHDB_PASSWORD}" \
                  "http://${COUCHDB_HOST}:${COUCHDB_PORT}/${db}/_all_docs?include_docs=true" \
                  -o "${db}.json"
                echo "  OK ($(wc -c < "${db}.json") bytes)"
              done

              # Metadata
              cat > backup-metadata.json <<METAEOF
              {
                "date": "${DATE}",
                "hour": "${HOUR}",
                "timestamp": "$(date -Iseconds)",
                "databases": "$(echo $DATABASES | tr '\n' ' ')",
                "type": "hourly"
              }
              METAEOF

              # ── Create archive ─────────────────────────────────
              echo "Creating archive..."
              tar -czf "${HOURLY_FILE}" -C "${BACKUP_ROOT}/temp" .
              rm -rf "${BACKUP_ROOT}/temp"

              # ── Encrypt archive if key is provided ─────────────
              if [ -n "${BACKUP_ENCRYPTION_KEY}" ]; then
                echo "Encrypting backup..."
                gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "${BACKUP_ENCRYPTION_KEY}" \
                  --output "${HOURLY_FILE}.gpg" "${HOURLY_FILE}"
                rm -f "${HOURLY_FILE}"
                HOURLY_FILE="${HOURLY_FILE}.gpg"
                echo "Backup encrypted with AES-256"
              fi

              SIZE=$(wc -c < "${HOURLY_FILE}")
              echo "Hourly backup: ${HOURLY_FILE} (${SIZE} bytes)"

              # ── Retention: keep last 24 ────────────────────────
              COUNT=$(ls -1 "${HOURLY_DIR}"/couchdb-backup-*.tar.gz* 2>/dev/null | wc -l)
              if [ "$COUNT" -gt 24 ]; then
                echo "Cleaning hourly (keeping last 24)..."
                ls -1t "${HOURLY_DIR}"/couchdb-backup-*.tar.gz* | tail -n +25 | while read f; do
                  echo "  Removing: $(basename "$f")"
                  rm -f "$f"
                done
              fi

              echo ""
              echo "Hourly backups: $(ls -1 "${HOURLY_DIR}"/couchdb-backup-*.tar.gz* 2>/dev/null | wc -l) (max 24)"
              echo "Hourly backup completed!"
            env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: couchdb-secret
                  key: username
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: couchdb-secret
                  key: password
            - name: BACKUP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-encryption-secret
                  key: encryption-key
                  optional: true
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            hostPath:
              path: /opt/money-app-backups
              type: DirectoryOrCreate
