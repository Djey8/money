# Ingress for external access (optional - if using ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: money-app-ingress
  namespace: money-app
  annotations:
    # Traefik annotations (K3s default ingress controller)
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # HTTP → HTTPS redirect
    traefik.ingress.kubernetes.io/router.middlewares: money-app-redirect-https@kubernetescrd
    # Let's Encrypt via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - cashflowhero.uk
    - www.cashflowhero.uk
    secretName: cashflowhero-tls
  rules:
  - host: cashflowhero.uk
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: www.cashflowhero.uk
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
# HTTP → HTTPS redirect middleware (Traefik)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: money-app
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# cert-manager ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@cashflowhero.uk
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
    - http01:
        ingress:
          class: traefik
